name: tehran_sound
description: "Tehran Sounds - Audio Map App"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  get: ^4.6.6

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_map_marker_cluster: ^1.3.6

  # Backend
  supabase_flutter: ^2.15.0

  # Audio recording / playback
  record: ^6.2.1
  just_audio: ^0.10.5
  audioplayers: ^6.6.0          # ← تغییر مهم: از 6.7.1 به 6.6.0 تنزل دادم

  # Location
  geolocator: ^11.0.0
  permission_handler: ^12.0.3

  # Storage
  path_provider: ^2.1.5

  # Network
  http: ^1.2.0

  # UI
  cupertino_icons: ^1.0.8
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true